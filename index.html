<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кошка Шредингера</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0d;
      color: #f4f4f5;
      line-height: 1.6;
    }
    header {
      background: #111114;
      border-bottom: 1px solid #2a2a33;
      padding: 20px 0;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }
    nav a {
      color: #ddd;
      text-decoration: none;
      margin-right: 18px;
    }
    nav a:hover {
      color: #fff;
    }
    .hero {
      padding: 80px 0;
      min-height: 50vh;
      display: flex;
      align-items: center;
    }
    h1 {
      font-size: 56px;
      margin: 0 0 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid #2a2a33;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      margin-right: 12px;
      margin-top: 10px;
    }
    .btn:hover {
      background: #1a1a20;
    }
    footer {
      border-top: 1px solid #2a2a33;
      padding: 24px 0;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div style="font-size: 28px; font-weight: bold;">Кошка Шредингера</div>
      <nav style="margin-top: 10px;">
        <a href="/">Главная</a>
        <a href="/articles/">Статьи</a>
        <a href="/proza/">Проза</a>
        <a href="/poeziya/">Поэзия</a>
        <a href="/about/">О проекте</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <h1>Кошка Шредингера</h1>
        <a class="btn" href="/articles/">Статьи</a>
        <a class="btn" href="/proza/">Проза</a>
        <a class="btn" href="/poeziya/">Поэзия</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      Кошка Шредингера
    </div>
  </footer>
</body>
</html>
