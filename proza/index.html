<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проза — Кошка Шредингера</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0d;
      color: #f4f4f5;
      line-height: 1.6;
    }
    header {
      background: #111114;
      border-bottom: 1px solid #2a2a33;
      padding: 20px 0;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }
    nav a {
      color: #ddd;
      text-decoration: none;
      margin-right: 18px;
    }
    nav a:hover {
      color: #fff;
    }
    section {
      padding: 40px 0;
      border-bottom: 1px solid #2a2a33;
    }
    h1 {
      font-size: 40px;
      margin: 0 0 16px;
    }
    .lead {
      font-size: 18px;
      color: #ddd;
      max-width: 760px;
    }
    .card {
      background: #17171d;
      border: 1px solid #2a2a33;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }
    footer {
      padding: 30px 0;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div style="font-size: 28px; font-weight: bold;">Кошка Шредингера</div>
      <nav style="margin-top: 10px;">
        <a href="/">Главная</a>
        <a href="/articles/">Статьи</a>
        <a href="/proza/">Проза</a>
        <a href="/poeziya/">Поэзия</a>
        <a href="/about/">О проекте</a>
      </nav>
    </div>
  </header>

  <main>
    <section>
      <div class="wrap">
        <h1>Проза</h1>
        <p class="lead">
          Здесь будут собраны рассказы, миниатюры, фрагменты и другие художественные тексты.
        </p>
      </div>
    </section>

    <section>
      <div class="wrap">
        <div class="card">
          Первый текст прозы появится здесь.
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      Раздел прозы сайта «Кошка Шредингера».
    </div>
  </footer>
</body>
</html>
