<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>О проекте — Кошка Шредингера</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0d;
      color: #f4f4f5;
      line-height: 1.8;
    }
    header {
      background: #111114;
      border-bottom: 1px solid #2a2a33;
      padding: 20px 0;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }
    nav a {
      color: #ddd;
      text-decoration: none;
      margin-right: 18px;
    }
    nav a:hover {
      color: #fff;
    }
    .hero {
      padding: 72px 0 40px;
    }
    h1 {
      font-size: 46px;
      line-height: 1.15;
      margin: 0 0 28px;
    }
    .poem {
      font-size: 24px;
      line-height: 1.9;
      color: #e8e8eb;
      white-space: pre-line;
    }
    .signature {
      margin-top: 28px;
      font-size: 20px;
      color: #cfcfd6;
    }
    footer {
      border-top: 1px solid #2a2a33;
      padding: 24px 0;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div style="font-size: 28px; font-weight: bold;">Кошка Шредингера</div>
      <nav style="margin-top: 10px;">
        <a href="/">Главная</a>
        <a href="/articles/">Статьи</a>
        <a href="/proza/">Проза</a>
        <a href="/poeziya/">Поэзия</a>
        <a href="/about/">О проекте</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <h1>О проекте</h1>

        <div class="poem">я Кошка вполне сингулярная,
у физиков непопулярная, 
я — не Дирак и не Жюль Верн,
пишу научный постмодерн.</div>

        <div class="signature">Кошка Шрёдингера</div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      Кошка Шредингера
    </div>
  </footer>
</body>
</html>
